<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>视频字幕工具</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>视频字幕工具</h1>
            <p>下载 YouTube 视频字幕，或从本地视频画面中 OCR 提取字幕。</p>
          </div>
        </header>

        <section class="homeGrid">
          <a class="toolCard" href="/download.html">
            <span>下载</span>
            <h2>YouTube 视频与字幕下载</h2>
            <p>输入公开视频链接，读取可用字幕语言，下载视频文件或外挂字幕。</p>
          </a>
          <a class="toolCard" href="/ocr.html">
            <span>OCR</span>
            <h2>画面字幕 OCR 提取</h2>
            <p>选择本地视频，框选字幕区域，只识别指定位置并导出 SRT。</p>
          </a>
        </section>
      </section>
    </main>
  </body>
</html>
